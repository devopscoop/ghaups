name: Release
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-tags: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@0152cc5f10c8c0b282eacc5ac4f542081ecc1e0f # v2
        with:
          generate_release_notes: true

      - name: Update major version tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          MAJOR="${TAG%%.*}"
          MINOR="${TAG%.*}"
          git tag -f "${MAJOR}" "${TAG}"
          git tag -f "${MINOR}" "${TAG}"
          git push origin "${MAJOR}" "${MINOR}" --force
