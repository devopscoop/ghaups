name: ghaups daily

on:
  schedule:
    - cron: '25 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@99dbd3bd00b86d82e52c37f2b6f7d20825f4c50f # v0.2.0

      - name: Pin actions and scan for vulnerabilities
        uses: devopscoop/ghaups@9324f6225cdc990c75ddf87a396681638a914ecf # v0.1.0
        with:
          files: .github/workflows/*.yml

      - name: Create pull request
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b ghaups/pin-actions
          git add .
          git commit -m 'chore: pin GitHub Actions to SHA refs'
          git push origin ghaups/pin-actions
          gh pr create \
            --title 'chore: pin GitHub Actions to SHA refs' \
            --body 'Automated daily pinning of GitHub Actions to commit SHAs.' \
            --head ghaups/pin-actions \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
