name: ghaups daily

on:
  schedule:
    - cron: '25 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Pin actions and scan for vulnerabilities
        uses: devopscoop/ghaups@0a76743c80ebab123a55ec25e2ed390be9cfbb16 # v0.1.1
        with:
          files: .github/workflows/*.yml

      # TODO: This seems overly complex. Investigate later.
      - name: Create pull request
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          MODIFIED=$(git diff --name-only HEAD)
          if [ -z "$MODIFIED" ]; then
            echo "No changes to commit"
            exit 0
          fi

          BASE_SHA=$(gh api "repos/$REPO/git/refs/heads/main" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/$REPO/git/commits/$BASE_SHA" --jq '.tree.sha')

          ENTRIES="[]"
          while read -r file; do
            CONTENT=$(base64 -w0 "$file")
            BLOB=$(gh api "repos/$REPO/git/blobs" \
              -f content="$CONTENT" \
              -f encoding=base64 \
              --jq '.sha')
            ENTRIES=$(echo "$ENTRIES" | \
              jq -c --arg path "$file" --arg sha "$BLOB" \
                '. += [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]')
          done < <(printf '%s\n' "$MODIFIED")

          TREE_SHA=$(jq -n \
            --arg base_tree "$BASE_TREE" \
            --argjson entries "$ENTRIES" \
            '{base_tree: $base_tree, tree: $entries}' | \
            gh api "repos/$REPO/git/trees" --input - --jq '.sha')

          COMMIT_SHA=$(gh api "repos/$REPO/git/commits" \
            -f message="chore: pin GitHub Actions to SHA refs" \
            -f tree="$TREE_SHA" \
            -f "parents[]=$BASE_SHA" \
            --jq '.sha')

          gh api "repos/$REPO/git/refs" \
            -f ref="refs/heads/ghaups/pin-actions" \
            -f sha="$COMMIT_SHA" > /dev/null

          gh pr create \
            --title 'chore: pin GitHub Actions to SHA refs' \
            --body 'Automated daily pinning of GitHub Actions to commit SHAs.' \
            --head ghaups/pin-actions \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
