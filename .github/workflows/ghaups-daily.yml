name: ghaups daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Pin actions and scan for vulnerabilities
        uses: ./
        with:
          files: .github/workflows/*.yml

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: 'chore: pin GitHub Actions to SHA refs'
          title: 'chore: pin GitHub Actions to SHA refs'
          body: 'Automated daily pinning of GitHub Actions to commit SHAs.'
          branch: ghaups/pin-actions
          delete-branch: true
