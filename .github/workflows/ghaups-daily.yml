name: ghaups daily

on:
  schedule:
    - cron: '25 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Pin actions and scan for vulnerabilities
        uses: devopscoop/ghaups@0a76743c80ebab123a55ec25e2ed390be9cfbb16 # v0.1.1
        with:
          files: .github/workflows/*.yml

      - name: Create pull request
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b ghaups/pin-actions
          git add .
          git commit -m 'chore: pin GitHub Actions to SHA refs'
          git push origin ghaups/pin-actions
          gh pr create \
            --title 'chore: pin GitHub Actions to SHA refs' \
            --body 'Automated daily pinning of GitHub Actions to commit SHAs.' \
            --head ghaups/pin-actions \
            --base main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
